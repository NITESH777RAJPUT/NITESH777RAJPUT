name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'        # Har din raat ko
  workflow_dispatch:           # Manual trigger
  push:
    branches: [ main, master ]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30         # Zyada time diya

    steps:
      - name: Generate Pac-Man Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: NITESH777RAJPUT
          games: 'pacman'         # Sirf pacman chahiye toh yahi rakho
