name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'     # Har roz midnight ko update
  workflow_dispatch:        # Manual run kar sakte ho
  push:
    branches: [ main ]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Pac-Man Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: NITESH777RAJPUT
          # Agar aur games chahiye toh uncomment kar do
          # games: 'pacman,breakout'

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
