name: Generate Snake Contribution

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: NITESH777RAJPUT
          svg_out_path: output/github-contribution-grid-snake.svg
          png_out_path: output/github-contribution-grid-snake.png

      - name: Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "Update contribution snake"
          add: "output/*.svg output/*.png"
